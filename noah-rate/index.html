<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>Noah 手机查价</title><style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:#172033;background:#f4f7fb}body{margin:0}.wrap{max-width:920px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #dde6f3;border-radius:16px;box-shadow:0 8px 24px rgba(31,42,68,.06);padding:16px;margin:12px 0}h1{font-size:22px;margin:6px 0}h2{font-size:17px;margin:0 0 10px}.muted{color:#69758a;font-size:13px;line-height:1.5}.grid{display:grid;grid-template-columns:1fr 100px;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:block;font-weight:700;font-size:13px;margin:8px 0 4px}input,select,button{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #cad6e6;padding:12px;font-size:16px;background:#fff}button{background:#1f4fd8;color:#fff;border-color:#1f4fd8;font-weight:800}button.secondary{background:#f1f5fb;color:#27415f;border-color:#cad6e6}.login{max-width:420px;margin:12vh auto}.hidden{display:none!important}.toolbar{display:flex;gap:8px;align-items:center}.toolbar button{width:auto;padding:8px 11px;font-size:13px}.summary{font-size:13px;color:#536176;margin:8px 0}.result{border:1px solid #dfe8f5;border-radius:14px;padding:12px;margin:10px 0;background:#fbfdff}.result-top{display:flex;justify-content:space-between;gap:10px}.supplier{font-weight:900}.price{font-size:20px;font-weight:900;color:#c40000;white-space:nowrap}.fixed{color:#b54700}.tags{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}.tag{display:inline-block;background:#eef4ff;border:1px solid #d6e5ff;border-radius:999px;padding:3px 8px;font-size:12px;color:#35527c}.detail{font-size:13px;color:#4b5b72;line-height:1.6}.error{background:#fff1f2;border-color:#fecdd3;color:#9f1239}.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}@media(max-width:680px){.wrap{padding:10px}.grid,.grid3{grid-template-columns:1fr}.result-top{display:block}.price{margin-top:6px}}
</style></head><body><div class="wrap"><div id="login" class="card login"><h1>手机查价</h1><p class="muted">输入密码后加载查价数据。当前为快速模式，数据加载会比加密版快很多。</p><label>密码</label><input id="password" type="password" placeholder="请输入密码" autocomplete="current-password"><div style="height:10px"></div><button onclick="unlock()">进入查价</button><p id="loginMsg" class="muted"></p></div><div id="app" class="hidden"><div class="card"><div class="toolbar"><div style="flex:1"><h1>Noah 手机查价</h1><div id="meta" class="muted">正在加载数据…</div></div><button class="secondary" onclick="lock()">退出</button></div></div><div class="card"><h2>快速查价</h2><div class="grid"><div><label>目的地 / 仓库 / 邮编</label><input id="dest" placeholder="德国、ONT8、90011、美西"></div><div><label>重量 KG</label><input id="weight" type="number" step="0.1" min="0.1" placeholder="100"></div></div><div class="grid3"><div><label>运输方式</label><select id="mainline"><option value="">全部</option><option value="SEA">海运</option><option value="AIR">空运</option><option value="RAIL">铁路</option><option value="TRUCK_AIR">卡航</option></select></div><div><label>线路关键词</label><input id="keyword" placeholder="正班、加班、EXX、带电"></div></div><div style="height:10px"></div><button onclick="runQuery()">开始查价</button><div class="summary" id="interpretation">输入目的地和重量后查价。</div></div><div class="card"><h2>查询结果</h2><div id="summary" class="summary">暂无结果。</div><div id="results"></div></div></div></div><script>
const PASSWORD_HASH='a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3';
const DATA_VERSION='dbc957acdf199722ad97df14d911afcdaed0439172db08675da160a0d5373044';
const LABELS={mainline:{SEA:'海运',AIR:'空运',RAIL:'铁路',TRUCK_AIR:'卡航'},tax:{TAX_INCLUDED:'包税',SELF_TAX:'自税 / 递延'},region:{WEST:'美西',CENTRAL:'美中',EAST:'美东'},service:{MATSON_REGULAR:'美森正班',MATSON_OVERTIME:'美森加班',FAST_SHIP:'快船',REGULAR_SHIP:'普船'}};
const REGION_BOUNDS={EAST:[0,39999],CENTRAL:[40000,79999],WEST:[80000,99999]};let DATA=null;const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function unlock(){try{$('loginMsg').textContent='正在加载数据…';const password=$('password').value;if(await sha256(password)!==PASSWORD_HASH)throw new Error('密码不正确。');DATA=await fetch(`rates.json?v=${encodeURIComponent(DATA_VERSION)}`,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('找不到 rates.json，请确认已经同步到 GitHub。');return r.json()});if(Array.isArray(DATA.fields)&&Array.isArray(DATA.records)&&Array.isArray(DATA.records[0])){const fs=DATA.fields;DATA.records=DATA.records.map(row=>{const o={};for(let i=0;i<fs.length;i++)o[fs[i]]=row[i];return o})}sessionStorage.setItem('price-password-ok','1');$('login').classList.add('hidden');$('app').classList.remove('hidden');$('meta').textContent=`数据更新时间：${DATA.generated_at||'—'} · 最新价格日期：${String(DATA.latest_effective_at||'—').slice(0,10)} · ${DATA.record_count||0} 条当前价格`;['dest','weight','keyword'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')runQuery()}));$('loginMsg').textContent=''}catch(e){$('loginMsg').textContent=e.message||String(e)}}
function lock(){DATA=null;sessionStorage.removeItem('price-password-ok');$('app').classList.add('hidden');$('login').classList.remove('hidden');$('password').value=''}
function detectDestination(raw){let s=String(raw||'').trim().toUpperCase();if(!s)return {kind:'UNKNOWN'};if(/^\d{5}$/.test(s)){const z=Number(s),first=s[0];return {kind:'ZIP',zipcode:z,us_region:first>='8'?'WEST':first>='4'?'CENTRAL':'EAST',text:`美国邮编 ${s}`}};if(['美西','US WEST','WEST'].includes(raw.trim())||s==='美西')return {kind:'REGION',us_region:'WEST',text:'美西'};if(['美中','US CENTRAL','CENTRAL'].includes(raw.trim())||s==='美中')return {kind:'REGION',us_region:'CENTRAL',text:'美中'};if(['美东','US EAST','EAST'].includes(raw.trim())||s==='美东')return {kind:'REGION',us_region:'EAST',text:'美东'};if(/^[A-Z]{2,6}\d[A-Z0-9]{0,5}$/.test(s)||/^[A-Z]{4}$/.test(s))return {kind:'WAREHOUSE',warehouse_code:s,text:`FBA 仓库 ${s}`};const countries={'德国':'DE','DE':'DE','GERMANY':'DE','法国':'FR','FRANCE':'FR','FR':'FR','意大利':'IT','ITALY':'IT','IT':'IT','西班牙':'ES','SPAIN':'ES','ES':'ES','英国':'GB','UK':'GB','GB':'GB','UNITED KINGDOM':'GB','罗马尼亚':'RO','RO':'RO','荷兰':'NL','NL':'NL','NETHERLANDS':'NL','比利时':'BE','BE':'BE','波兰':'PL','PL':'PL','捷克':'CZ','CZ':'CZ','美国':'US','USA':'US','US':'US'};if(countries[s]||countries[raw.trim()])return {kind:'COUNTRY',country_code:countries[s]||countries[raw.trim()],text:raw.trim()};return {kind:'UNKNOWN',text:raw.trim()}}
function matchDest(r,d){if(d.kind==='WAREHOUSE')return String(r.warehouse_code||'').toUpperCase()===d.warehouse_code;if(d.kind==='ZIP'){if(r.zip_start!=null&&r.zip_end!=null)return Number(r.zip_start)<=d.zipcode&&Number(r.zip_end)>=d.zipcode;return (!r.zip_start&&!r.zip_end)&&(r.us_region===d.us_region||(r.country_code==='US'&&!r.us_region))}if(d.kind==='REGION'){const b=REGION_BOUNDS[d.us_region];if(r.zip_start!=null&&r.zip_end!=null)return Number(r.zip_start)<=b[1]&&Number(r.zip_end)>=b[0];return (!r.zip_start&&!r.zip_end)&&(r.us_region===d.us_region||(r.country_code==='US'&&!r.us_region))}if(d.kind==='COUNTRY'){if(d.country_code==='US')return r.country_code==='US'&&!r.zip_start&&!r.zip_end;return String(r.country_code||'').toUpperCase()===d.country_code}return false}
function matchWeight(r,w){const ceil=Math.ceil(w);if((r.record_type||'PRICE_PER_KG')==='FIXED_TOTAL_BY_WEIGHT')return Number(r.weight_threshold)>=w;if(r.weight_upper_bound!=null&&r.weight_upper_bound!==''){const lo=Number(r.weight_threshold),hi=Number(r.weight_upper_bound),inc=Number(r.weight_upper_inclusive)!==0;return lo<=ceil&&(inc?ceil<=hi:ceil<hi)}return Number(r.weight_threshold)<=ceil}
function keywordTokens(s){return String(s||'').toUpperCase().split(/[\s,，、]+/).map(x=>x.trim()).filter(Boolean)}
function matchKeyword(r,tokens){if(!tokens.length)return true;const text=String([r.channel_label,r.service_level,r.lead_time,r.remarks,r.source_filename,r.sheet_name].join(' ')).toUpperCase();return tokens.every(t=>{const vs=t==='带电'?['带电','内电']:t==='正班'?['正班','MATSON_REGULAR']:t==='加班'?['加班','MATSON_OVERTIME']:[t];return vs.some(v=>text.includes(String(v).toUpperCase()))})}
function weightText(r){if(r.record_type==='FIXED_TOTAL_BY_WEIGHT')return `≤ ${r.weight_threshold}KG`;if(r.weight_label)return r.weight_label;if(r.weight_upper_bound!=null&&r.weight_upper_bound!=='')return `${r.weight_threshold}-${r.weight_upper_bound}KG`;return `${r.weight_threshold}KG+`}
function destinationText(r){return r.warehouse_code||(r.zip_label?`邮编 ${r.zip_label}`:'')||(LABELS.region[r.us_region])||r.country_code||r.entity_display||'—'}
function priceText(r){return r.record_type==='FIXED_TOTAL_BY_WEIGHT'?`${r.price} RMB 总价`:`${r.price} RMB/KG`}
function lookupUpsRemoteZip(d){if(!DATA||d.kind!=='ZIP'||!DATA.ups_remote_zip)return null;const z=String(d.zipcode).padStart(5,'0'),info=DATA.ups_remote_zip||{};if((info.extended||[]).includes(z))return {zipcode:z,label:info.extended_label||'UPS超偏远',message:`邮编 ${z} 属于 UPS 超偏远邮编，报价时需要额外确认偏远附加费。`};if((info.normal||[]).includes(z))return {zipcode:z,label:info.normal_label||'UPS正常偏远',message:`邮编 ${z} 属于 UPS 正常偏远邮编，报价时需要额外确认偏远附加费。`};return null}
function remoteZipHtml(info){return info?`<div class="result warn"><b>UPS 偏远提示：</b>${esc(info.message)}<br><span class="muted">这里只提示偏远属性，不自动加收费用。</span></div>`:''}
function runQuery(){try{if(!DATA)throw new Error('请先输入密码。');const d=detectDestination($('dest').value),w=Number($('weight').value||0);if(d.kind==='UNKNOWN')throw new Error('无法识别目的地，请输入国家、美区、邮编或 FBA 仓库代码。');if(!w||w<=0)throw new Error('请输入重量。');const main=$('mainline').value,tokens=keywordTokens($('keyword').value),remote=lookupUpsRemoteZip(d),remoteHtml=remoteZipHtml(remote);$('interpretation').textContent=`已识别：${d.text||$('dest').value} · ${w}KG${remote?` · ${remote.label}`:''}`;let rows=(DATA.records||[]).filter(r=>matchDest(r,d)&&matchWeight(r,w)&&(!main||r.mainline===main)&&matchKeyword(r,tokens));rows.sort((a,b)=>Number(a.price)-Number(b.price));rows=rows.slice(0,80);$('summary').textContent=`找到 ${rows.length} 条匹配线路。${remote?` · ${remote.label}`:''}`;if(!rows.length){$('results').innerHTML=remoteHtml+'<div class="result warn">没有匹配结果。可以取消运输方式或关键词再试。</div>';return}$('results').innerHTML=remoteHtml+rows.map(r=>`<div class="result"><div class="result-top"><div><div class="supplier">${esc(r.supplier_name)}</div><div class="muted">${esc(destinationText(r))} · ${esc(LABELS.mainline[r.mainline]||r.mainline||'—')} · ${esc(r.channel_label||'—')}</div></div><div class="price ${r.record_type==='FIXED_TOTAL_BY_WEIGHT'?'fixed':''}">${esc(priceText(r))}</div></div><div class="tags"><span class="tag">${esc(weightText(r))}</span><span class="tag">${esc(r.market==='US'?'美国':(LABELS.tax[r.tax_type]||r.tax_type||'未标注'))}</span><span class="tag">${esc(r.last_mile==='TRUCK'?'卡派':'快递派')}</span>${remote&&r.last_mile!=='TRUCK'?`<span class="tag">${esc(remote.label)}</span>`:''}${r.service_level?`<span class="tag">${esc(LABELS.service[r.service_level]||r.service_level)}</span>`:''}</div><div class="detail">时效：${esc(r.lead_time||'—')}<br>来源：${esc(r.source_filename||'—')} / ${esc(r.sheet_name||'—')} / ${esc(r.price_cell||'')}<br>更新时间：${esc(String(r.source_modified_at||r.created_at||'').slice(0,10)||'—')}</div></div>`).join('')}catch(e){$('summary').textContent='查询失败';$('results').innerHTML=`<div class="result error">${esc(e.message||String(e))}</div>`}}
$('password').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
</script></body></html>
