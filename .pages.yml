media:
  input: assets/images
  output: /assets/images

content:
  - name: shipping_guides
    label: Shipping guides
    type: group
    items:
      - name: usa_guides
        label: USA Guides
        type: collection
        path: content/guides/usa
        format: yaml-frontmatter
        filename: "{primary}.md"
        exclude: [".gitkeep"]
        view:
          primary: title
          fields: [published, date, featured]
          sort: date
          order: desc
        fields:
          - name: title
            label: Article title
            type: string
            required: true
            options:
              maxlength: 110
          - name: description
            label: Short introduction
            type: text
            required: true
          - name: seo_title
            label: SEO title
            type: string
            required: true
            options:
              maxlength: 68
          - name: seo_description
            label: SEO description
            type: text
            required: true
          - name: date
            label: Publish date
            type: date
            required: true
            options:
              format: yyyy-MM-dd
          - name: updated
            label: Updated date
            type: date
            options:
              format: yyyy-MM-dd
          - name: featured
            label: Featured article
            type: boolean
          - name: published
            label: Publish on website
            type: boolean
          - name: body
            label: Article content
            type: rich-text
            required: true
            options:
              format: markdown
      - name: europe_guides
        label: Europe Guides
        type: collection
        path: content/guides/europe
        format: yaml-frontmatter
        filename: "{primary}.md"
        exclude: [".gitkeep"]
        view:
          primary: title
          fields: [published, date, featured]
          sort: date
          order: desc
        fields:
          - name: focus_country
            label: Country focus (optional)
            type: select
            description: Choose Europe-wide for general articles, or select one destination when the article answers a country-specific question.
            options:
              placeholder: Select a country focus
              values:
                - Europe-wide
                - Austria
                - Belgium
                - Bulgaria
                - Croatia
                - Czech Republic
                - Denmark
                - Estonia
                - Finland
